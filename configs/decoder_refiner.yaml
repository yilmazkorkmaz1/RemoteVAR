# Decoder refiner: finetune a skip-conditioned VQVAE decoder using frozen RemoteVAR fusion features.
#
# Usage:
#   python train_decoder_refiner.py --config configs/decoder_refiner.yaml --remotevar_checkpoint <PATH>
#
# Notes:
# - If `use_precomputed_predictions=true`, this expects:
#     <predictions_dir>/<dataset_name>_train_mask_fhat.pt
#     <predictions_dir>/<dataset_name>_val_mask_fhat.pt
#   where each file is either a tensor (N,C,16,16) or a dict containing key `mask_fhat`.
#
dataset_name: cd_union
cd_union_datasets: [whu_cd, levircd, levircdplus, s2looking]
image_size: 256
batch_size: 4
num_workers: 8
dataset_root: data

# Geometric augmentation (SAFE when use_teacher_forcing_forward=true because mask_fhat is computed on-the-fly)
# Random crop always resizes back to image_size.
enable_random_crop: false
enable_random_flip: false
enable_random_rotation: false
crop_scale_range: [0.8, 1.0]
min_crop_size: 256
max_crop_size: 256
rotation_angle: 10

# training
num_epochs: 50
learning_rate: 1.0e-4
weight_decay: 1.0e-4
weight_decay_end: 0.0
lr_scheduler: cos
min_lr: 0.0
wp0: 0.005
wpe: 0.01
clip: 2.0
gradient_accumulation_steps: 1
mixed_precision: bf16
seed: 42
output_dir: experiments
run_name: remotevar_decoder_refiner

# wandb (optional)
use_wandb: true
wandb_project: RemoteVAR
# Set to 'online' to sync to cloud (requires WANDB_API_KEY). Use 'offline' to avoid login.
wandb_mode: online
log_interval: 100

# validation evaluation
compute_val_metrics: true
val_pred_thr_01: 0.5
val_gt_thr_01: 0.1
val_metrics_max_batches: -1
save_val_images: true
val_num_save_samples: 4
val_viz_every: 1
viz_target_ratio: 0.5
viz_fallback_ratio: 0.2

# VQVAE
vocab_size: 4096
z_channels: 32
ch: 160
vqvae_pretrained_path: pretrained/vae_ch160v4096z32.pth
train_post_quant_conv: false

# Frozen RemoteVAR checkpoint (set this!)
remotevar_checkpoint: null

# RemoteVAR / fusion settings (must match the checkpoint)
v_patch_nums: [1, 2, 3, 4, 5, 6, 8, 10, 13, 16]
depth: 16
mask_type: change_append
cond_drop_rate: 0.0
drop_path_rate: 0.0
cross_attn_inner_dim: 1024
disable_cross_attention: false
dropout: 0.15

# Loss
loss_l2_rgb_weight: 0.0
loss_bce_weight: 1.0
loss_dice_weight: 0.0
loss_focal_weight: 0.0
loss_focal_gamma: 1.0
loss_focal_alpha: 0.5
loss_gt_thr_01: 0.1
loss_bce_pos_weight: 1.0
loss_bce_neg_weight: 1.0
loss_fp_weight: 0.0
loss_fg_reduce: soft_or

# Optional: palette cross-entropy on location-coded RGB masks (black + colormap classes)
loss_palette_ce_weight: 0.0
loss_palette_ce_temp: 0.05

# Decoder output (1ch logits for BCE-only training)
decoder_out_channels: 1

# The released checkpoint predates the optional extra skip-fuse adapters.
decoder_skip_fuse_extra_depth: 0
decoder_skip_fuse_extra_width_mult: 1.0

# Do NOT use the extra RGB->mask head when decoder_out_channels=1
use_rgb_to_mask_head: false
rgb_to_mask_head_init: sum_rgb

# Photometric augmentation (OPTIONAL)
enable_color_jitter: false
color_jitter_pairwise: true
color_jitter_probability: 0.8
color_jitter_brightness: 0.2
color_jitter_contrast: 0.2
color_jitter_saturation: 0.2
color_jitter_hue: 0.05
allow_color_jitter_with_cached_predictions: false

enable_gaussian_blur: false
blur_probability: 0.5
blur_kernel_sizes: [3, 5, 7]
allow_gaussian_blur_with_cached_predictions: false

# The released experiment did not perturb cached mask latents.
cached_pred_fhat_noise_strength: 0.0
cached_pred_fhat_noise_mode: relative
cached_pred_fhat_noise_clip: 3.0

# Context levels + fusion module config (must match checkpoint)
use_high_res_context_levels: false
fusion_downsample_ratios: [1, 1, 1, 1]
fusion_num_heads: 8
fusion_num_layers: 2
fusion_cross_inner_dim: null
fusion_use_feature_rectify: false
fusion_downsample_first: false

# optional: joint fine-tuning of fusion modules
train_fusion: true
allow_trainable_encoder: false
fusion_lr_scale: 1.0
fusion_wd_scale: 1.0

# extra high-res fusion modules for decoder skips (initialized from scratch)
decoder_extra_fusion_resolutions: []
decoder_extra_fusion_num_heads: 8
decoder_extra_fusion_num_layers: 1
decoder_extra_fusion_cross_inner_dim: null
decoder_extra_fusion_use_feature_rectify: false
decoder_extra_fusion_downsample_first: false

# Cached predictions (recommended for speed)
use_precomputed_predictions: true
predictions_dir: predictions

precomputed_predictions_dataset_name: cd_union
precomputed_predictions_cd_union_datasets: [whu_cd, levircd, levircdplus, s2looking]
precomputed_predictions_allow_subset_from_union: true

# On-the-fly predictions (no caching) using RemoteVAR teacher-forcing forward
use_teacher_forcing_forward: false
val_use_precomputed_predictions: true
noisy_tf_mask_prob: 0.0
noisy_tf_mask_mode: random

# Dataset mask encoding
mask_rgb_by_location: true
mask_rgb_grid_size: 11
mask_rgb_index_mode: grid
mask_rgb_levels: 0

